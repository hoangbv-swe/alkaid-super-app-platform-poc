# Khởi tạo biến mapping động cho Cache.
map $sent_http_content_type $cache_control {
    default                         "public, max-age=31536000, immutable";
    "text/html"                     "no-store, no-cache, must-revalidate, proxy-revalidate";
    "text/html; charset=utf-8"      "no-store, no-cache, must-revalidate, proxy-revalidate";
    "application/json"              "no-store, no-cache";
}

server {
    # Khai báo cấu hình cốt lõi của server.
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Gắn các Header bảo mật (Security Headers).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.alkaid.com;" always;
    add_header Cache-Control $cache_control always;

    # Cấu hình nén nội dung (Gzip).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Cấu hình Health Check (Liveness/Readiness Probe) cho Kubernetes.
    location = /healthz {
        access_log off;
        return 200 "healthy\n";
    }

    # Xử lý routing cho SPA (Fallback về index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sử dụng Regex để bắt tất cả các request gọi file tĩnh (hình ảnh, font chữ, css, js).
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|map)$ {
        access_log off;
        try_files $uri =404;
    }
}
